<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Search Box UI */
        .search-container { max-width: 450px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        .search-container h2 { color: var(--p); margin-bottom: 20px; }
        input[type="text"] { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: var(--p); }
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; }

        /* RECEIPT DESIGN (PINK & A4 LANDSCAPE) */
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 20px; width: 100%; max-width: 1100px; margin: 0 auto; }
        .receipt-box { flex: 1; background: #ffdae9; border: 2px solid #000; padding: 15px; color: #000; position: relative; font-family: Arial, sans-serif; min-height: 450px;}
        .r-header { text-align: center; }
        .r-header h2 { margin: 0; font-size: 18px; font-weight: 900; }
        .r-header p { margin: 1px; font-size: 9px; font-weight: bold; }
        .top-info { display: flex; justify-content: space-between; font-size: 10px; margin-top: 5px; border-bottom: 1px solid #000; padding-bottom: 2px; }
        .copy-tag { background: #000; color: #fff; padding: 2px 8px; font-size: 10px; font-weight: bold; text-transform: uppercase; border-radius: 3px; }
        .student-details { display: grid; grid-template-columns: 1fr 1fr; font-size: 10px; margin-top: 8px; line-height: 1.5; }
        .r-table { width: 100%; border-collapse: collapse; margin-top: 5px; border: 1px solid #000; }
        .r-table th, .r-table td { border: 1px solid #000; padding: 3px; font-size: 10px; text-align: center;}
        .words-section { border-bottom: 1px dotted #000; padding: 3px 0; font-size: 10px; margin-top: 5px; font-style: italic; }
        .footer-sigs { display: flex; justify-content: space-between; margin-top: 30px; font-size: 10px; font-weight: bold; }

        @media print { 
            @page { size: A4 landscape; margin: 5mm; }
            .no-print { display: none !important; } 
            body { background: none; padding: 0; }
            #receipt-modal { position: absolute; top:0; left:0; width:100%; display: block !important; padding: 0; }
            .print-wrapper { gap: 10px; }
            .receipt-box { border: 1px solid #000; }
        }
    </style>
</head>
<body>

<div class="search-container no-print">
    <h2>Search Student Receipt</h2>
    <input type="text" id="sid" placeholder="Enter Student ID (e.g. 12)">
    <button class="btn-search" onclick="doSearch()">SEARCH & GENERATE</button>
</div>

<div id="receipt-modal">
    <div class="print-wrapper">
        <div class="receipt-box" id="guardian-copy"></div>
        <div class="receipt-box" id="office-copy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px; padding-bottom: 40px;">
        <button onclick="window.print()" style="padding:12px 40px; background:green; color:white; border:none; border-radius:6px; font-weight:bold; cursor:pointer;">PRINT BOTH COPIES</button>
        <button onclick="location.reload()" style="padding:12px 40px; background:#666; color:white; border:none; border-radius:6px; margin-left:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    // Aapka backend URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLK7x1LSLSzKqPiQOBT1-3h1SyG8hqmRAOoUdzJaYJ8s4MRQGPzv4Uf2c_yJreh-41/exec";

    function roman(n) { const r = ["i","ii","iii","iv","v","vi","vii","viii","ix","x"]; return r[n-1] || n; }

    function numberToWords(num) {
        var a = ['','One ','Two ','Three ','Four ', 'Five ','Six ','Seven ','Eight ','Nine ','Ten ','Eleven ','Twelve ','Thirteen ','Fourteen ','Fifteen ','Sixteen ','Seventeen ','Eighteen ','Nineteen '];
        var b = ['', '', 'Twenty','Thirty','Forty','Fifty', 'Sixty','Seventy','Eighty','Ninety'];
        if (num == 0) return 'Zero';
        if ((num = num.toString()).length > 9) return '';
        var n = ('000000000' + num).substr(-9).match(/^(\d{2})(\d{2})(\d{2})(\d{1})(\d{2})$/);
        if (!n) return ''; var str = '';
        str += (n[1] != 0) ? (a[Number(n[1])] || b[n[1][0]] + ' ' + a[n[1][1]]) + 'Crore ' : '';
        str += (n[2] != 0) ? (a[Number(n[2])] || b[n[2][0]] + ' ' + a[n[2][1]]) + 'Lakh ' : '';
        str += (n[3] != 0) ? (a[Number(n[3])] || b[n[3][0]] + ' ' + a[n[3][1]]) + 'Thousand ' : '';
        str += (n[4] != 0) ? (a[Number(n[4])] || b[n[4][0]] + ' ' + a[n[4][1]]) + 'Hundred ' : '';
        str += (n[5] != 0) ? ((str != '') ? 'and ' : '') + (a[Number(n[5])] || b[n[5][0]] + ' ' + a[n[5][1]]) : '';
        return str.trim();
    }

    async function doSearch() {
        var id = document.getElementById('sid').value;
        if(!id) return Swal.fire('Error', 'Please enter Student ID', 'error');
        
        Swal.fire({title: 'Fetching Data...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

        try {
            const response = await fetch(`${SCRIPT_URL}?action=searchData&id=${id}`);
            const results = await response.json();
            
            if(!results || results.length === 0) {
                Swal.fire('Not Found', 'No record found for this ID', 'warning');
                return;
            }
            
            Swal.close();
            // Sabse latest record (last entry) pick karega
            var latestData = results[results.length - 1]; 
            showDualReceipt(latestData);
        } catch (e) {
            Swal.fire('Error', 'Could not connect to database', 'error');
        }
    }

    function generateReceiptHTML(d, type) {
        let sl = 1; let rows = "";
        
        // Fee Categories mapping
        const mainFees = ["Prev Dues", "Admission Fee", "School Fee", "School Van Fee", "Hostel & School Fee", "Exam Fee", "School Bag", "Development Fee", "Other Fee"];
        
        mainFees.forEach(k => { 
            if(d[k] && parseFloat(d[k]) > 0) {
                rows += `<tr><td>${sl++}.</td><td align="left">${k}</td><td>1</td><td>${d[k]}</td></tr>`;
            }
        });

        // Dynamic Extra Headers (Uniform/Books etc) check
        const exclude = ["Student Id","Month","Student Name","Father Name","Class","Address","Prev Dues","Admission Fee","School Fee","Hostel & School Fee","Exam Fee","School Bag","Discount","Total Paid","Total Dues","Remaining","Paid Date","School Van Fee","Development Fee","Other Fee","Sub Total"];
        
        Object.keys(d).forEach(k => {
            if(!exclude.includes(k) && d[k] && parseFloat(d[k]) > 0) {
                rows += `<tr><td>${sl++}.</td><td align="left">${k}</td><td>1</td><td>${d[k]}</td></tr>`;
            }
        });

        return `
            <div class="r-header">
                <div style="display:flex; justify-content:space-between;"><span class="copy-tag">${type}</span><span style="font-size:9px">UDISE: 10101122703</span></div>
                <h2>SAGAR PUBLIC SCHOOL</h2>
                <p>QUAZITOLA, BARSOI (KATIHAR)</p>
                <p style="font-size:8px">email: sagarpublicschool2023@gmail.com</p>
                <p style="font-size:7px">RTE Reg No.21211472023218114225 | UDISE No.10101122703</p>
            </div>
            <div class="top-info"><span>Sl: A-${Math.floor(1000 + Math.random() * 9000)}</span><span>Date: ${d["Paid Date"] || new Date().toLocaleDateString('en-GB')}</span></div>
            <div class="student-details">
                <div><b>Name:</b> ${d["Student Name"]}</div><div><b>ID:</b> ${d["Student Id"]}</div>
                <div><b>Father:</b> ${d["Father Name"]}</div><div><b>Class:</b> ${d["Class"]}</div>
                <div><b>Address:</b> ${d["Address"]}</div><div><b>Month:</b> ${d["Month"]}</div>
            </div>
            <table class="r-table">
                <thead><tr><th width="30">Sl.</th><th>Description</th><th width="30">Qty</th><th width="60">Amount</th></tr></thead>
                <tbody>${rows}</tbody>
                <tfoot>
                    <tr><th colspan="3" align="right">Sub Total</th><td>${d["Sub Total"]}</td></tr>
                    <tr><th colspan="3" align="right">Discount (-)</th><td>${d["Discount"]}</td></tr>
                    <tr><th colspan="3" align="right">Net Paid</th><td><b>${d["Total Paid"]}</b></td></tr>
                    <tr><th colspan="3" align="right">Due Balance</th><td style="color:red"><b>${d["Remaining"]}</b></td></tr>
                </tfoot>
            </table>
            <div class="words-section"><b>Words:</b> ${numberToWords(d["Total Paid"])} Only.</div>
            <div class="footer-sigs"><span>Parent Signature</span><span>Authorized Signature</span></div>
        `;
    }

    function showDualReceipt(d) {
        document.getElementById('guardian-copy').innerHTML = generateReceiptHTML(d, "Guardian's Copy");
        document.getElementById('office-copy').innerHTML = generateReceiptHTML(d, "Office Copy");
        document.getElementById('receipt-modal').style.display = 'block';
    }
</script>
</body>
</html>
