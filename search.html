<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .search-container { max-width: 500px; margin: 50px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        /* Receipt Modal Styles (Same as Entry Page) */
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 20px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 20px; width: 100%; max-width: 1100px; margin: 0 auto; }
        .receipt-box { flex: 1; background: #ffdae9; border: 2px solid #000; padding: 15px; color: #000; position: relative; font-family: Arial, sans-serif; }
        .r-table { width: 100%; border-collapse: collapse; margin-top: 5px; border: 1px solid #000; }
        .r-table th, .r-table td { border: 1px solid #000; padding: 3px; font-size: 10px; }
        @media print { .no-print { display: none !important; } #receipt-modal { display: block !important; } }
    </style>
</head>
<body>

<div class="search-container no-print">
    <h2 style="color:var(--p)">Search Fee Receipt</h2>
    <input type="text" id="searchId" placeholder="Enter Student ID (e.g. 12)">
    <button class="btn-search" onclick="searchReceipt()">SEARCH & VIEW RECEIPT 🔍</button>
</div>

<div id="receipt-modal">
    <div class="print-wrapper" id="receipt-content">
        <div class="receipt-box" id="guardian-copy"></div>
        <div class="receipt-box" id="office-copy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" style="padding:10px 40px; background:green; color:white; border:none; border-radius:4px; font-weight:bold; cursor:pointer;">PRINT BOTH COPIES</button>
        <button onclick="location.reload()" style="padding:10px 40px; background:#666; color:white; border:none; border-radius:4px; margin-left:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxeZr9F1N0SIn1JqP6KsIS4fvJs0538Gy0p4-IT9psIiJ2rzyepXkn6iHm_OIIPJWhc/exec"; // Paste your URL here

    async function searchReceipt() {
        const id = document.getElementById('searchId').value;
        if(!id) return Swal.fire('Error', 'Please enter Student ID', 'error');

        Swal.fire({title: 'Searching...', didOpen: () => Swal.showLoading()});

        try {
            const response = await fetch(`${SCRIPT_URL}?action=search&id=${id}`);
            const data = await response.json();

            if (data.error) {
                Swal.fire('Not Found', 'No record found for this ID', 'warning');
            } else {
                Swal.close();
                showDualReceipt(data);
            }
        } catch (e) {
            Swal.fire('Error', 'Connection failed', 'error');
        }
    }

    // Reuse your existing generateReceiptHTML and showDualReceipt functions here
    function generateReceiptHTML(d, type) {
        // ... (Same logic as your Entry Page to build rows from data object 'd')
        // Ensure you use d["Sub Total"], d["Discount"], etc.
    }

    function showDualReceipt(d) {
        document.getElementById('guardian-copy').innerHTML = generateReceiptHTML(d, "Guardian's Copy");
        document.getElementById('office-copy').innerHTML = generateReceiptHTML(d, "Office Copy");
        document.getElementById('receipt-modal').style.display = 'block';
    }
</script>
</body>
</html>
