<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .search-box { max-width: 400px; margin: 40px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box;}
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 10px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 10px; }
        .receipt-box { flex: 1; background: #ffdae9; border: 1.5px solid #000; padding: 15px; font-size: 11px; color: #000; line-height: 1.4; text-align: left; }
        .r-table { width: 100%; border-collapse: collapse; margin: 10px 0; border: 1px solid #000; }
        .r-table th, .r-table td { border: 1px solid #000; padding: 4px; text-align: left; }
        @media print { .no-print { display: none !important; } #receipt-modal { display: block !important; } }
    </style>
</head>
<body>

<div class="search-box no-print">
    <h3 style="color:var(--p)">Search Student Receipt</h3>
    <input type="text" id="sid" placeholder="Enter Student ID (e.g. 12)">
    <button class="btn-search" onclick="doSearch()">SEARCH NOW</button>
</div>

<div id="receipt-modal">
    <div class="print-wrapper" id="printArea">
        <div class="receipt-box" id="gCopy"></div>
        <div class="receipt-box" id="oCopy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" style="padding:10px 30px; background:green; color:white; border:none; border-radius:4px; cursor:pointer;">PRINT BOTH COPIES</button>
        <button onclick="location.reload()" style="padding:10px 30px; background:#666; color:white; border:none; border-radius:4px; margin-left:10px; cursor:pointer;">CLOSE</button>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeZr9F1N0SIn1JqP6KsIS4fvJs0538Gy0p4-IT9psIiJ2rzyepXkn6iHm_OIIPJWhc/exec";

    async function doSearch() {
        var id = document.getElementById('sid').value;
        if(!id) return Swal.fire('Error', 'Please enter ID', 'error');
        
        Swal.fire({title: 'Searching...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});

        try {
            const response = await fetch(`${WEB_APP_URL}?action=searchData&id=${id}`);
            const results = await response.json();
            
            if(!results || results.length === 0) {
                Swal.fire('Not Found', 'No record found for this ID', 'warning');
                return;
            }
            
            Swal.close();
            var d = results[results.length - 1]; // Latest record
            renderReceipt(d);
        } catch (e) {
            Swal.fire('Error', 'Could not connect to database', 'error');
        }
    }

    function renderReceipt(d) {
        var content = `
            <div style="text-align:center">
                <h3 style="margin:0">SAGAR PUBLIC SCHOOL</h3>
                <p style="margin:0; font-size:10px">QUAZITOLA, BARSOI (KATIHAR)</p>
            </div>
            <div style="display:flex; justify-content:space-between; margin-top:10px; border-bottom:1px solid #000">
                <span><b>ID:</b> ${d["Student Id"]}</span><span><b>Date:</b> ${d["Paid Date"] || ''}</span>
            </div>
            <p style="margin:5px 0"><b>Name:</b> ${d["Student Name"]}<br><b>Father:</b> ${d["Father Name"]}<br><b>Class:</b> ${d["Class"]}<br><b>Month:</b> ${d["Month"]}</p>
            <table class="r-table">
                <tr><th>Description</th><th align="right">Amount</th></tr>
                <tr><td>Fees Sub-Total</td><td align="right">${d["Sub Total"]}</td></tr>
                <tr><td>Discount (-)</td><td align="right">${d["Discount"] || 0}</td></tr>
                <tr style="background:#eee"><td><b>Net Paid (Deposit)</b></td><td align="right"><b>${d["Total Paid"]}</b></td></tr>
                <tr style="color:red"><td><b>Due Balance</b></td><td align="right"><b>${d["Remaining"]}</b></td></tr>
            </table>
            <div style="margin-top:20px; display:flex; justify-content:space-between">
                <span>Guardian's Sign</span><span>Operator's Sign</span>
            </div>
        `;
        document.getElementById('gCopy').innerHTML = "<small><b>GUARDIAN COPY</b></small>" + content;
        document.getElementById('oCopy').innerHTML = "<small><b>OFFICE COPY</b></small>" + content;
        document.getElementById('receipt-modal').style.display = 'block';
    }
</script>
</body>
</html>
