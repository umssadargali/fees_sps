<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .search-box { max-width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .btn-search { width: 100%; padding: 12px; background: var(--p); color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        #receipt-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; overflow-y: auto; padding: 10px; }
        .print-wrapper { display: flex; justify-content: space-between; gap: 10px; width: 100%; }
        .receipt-box { flex: 1; background: #ffdae9; border: 1.5px solid #000; padding: 10px; color: #000; font-size: 11px; }
        .r-table { width: 100%; border-collapse: collapse; margin: 5px 0; border: 1px solid #000; }
        .r-table th, .r-table td { border: 1px solid #000; padding: 3px; text-align: left; }
        @media print { .no-print { display: none !important; } #receipt-modal { display: block !important; position: relative; } }
    </style>
</head>
<body>

<div class="search-box no-print">
    <h2 style="color:var(--p)">Find Receipt</h2>
    <input type="text" id="sid" placeholder="Enter Student ID (e.g. 12)">
    <button class="btn-search" onclick="doSearch()">SEARCH RECEIPT 🔍</button>
</div>

<div id="receipt-modal">
    <div class="print-wrapper" id="receipt-content">
        <div class="receipt-box" id="g-copy"></div>
        <div class="receipt-box" id="o-copy"></div>
    </div>
    <div class="no-print" style="text-align:center; margin-top:20px;">
        <button onclick="window.print()" style="padding:10px 30px; background:green; color:white; border:none; border-radius:4px; cursor:pointer;">PRINT</button>
        <button onclick="location.reload()" style="padding:10px 30px; background:#666; color:white; border:none; border-radius:4px; margin-left:10px;">CLOSE</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxeZr9F1N0SIn1JqP6KsIS4fvJs0538Gy0p4-IT9psIiJ2rzyepXkn6iHm_OIIPJWhc/exec";

    function doSearch() {
        let id = document.getElementById('sid').value;
        if(!id) return Swal.fire('Error', 'Enter Student ID', 'error');
        
        Swal.fire({title: 'Searching...', didOpen: () => Swal.showLoading()});

        google.script.run.withSuccessHandler(function(results) {
            if(results.length === 0) {
                Swal.fire('Not Found', 'No record found', 'warning');
            } else {
                Swal.close();
                let data = results[results.length - 1]; // Latest record
                showReceipt(data);
            }
        }).searchData(id);
    }

    function showReceipt(d) {
        let html = `
            <div style="text-align:center; font-weight:bold; font-size:14px;">SAGAR PUBLIC SCHOOL</div>
            <div style="text-align:center; font-size:10px; margin-bottom:5px;">QUAZITOLA, BARSOI (KATIHAR)</div>
            <hr style="border:0.5px solid #000">
            <table style="width:100%; margin-bottom:5px;">
                <tr><td><b>Name:</b> ${d["Student Name"]}</td><td align="right"><b>Date:</b> ${d["Paid Date"] || ''}</td></tr>
                <tr><td><b>Class:</b> ${row["Class"]}</td><td align="right"><b>ID:</b> ${d["Student Id"]}</td></tr>
                <tr><td><b>Month:</b> ${d["Month"]}</td></tr>
            </table>
            <table class="r-table">
                <tr><th>SL</th><th>Description</th><th align="right">Amount</th></tr>
                <tr><td>1</td><td>Monthly Fee/Regular</td><td align="right">${d["Sub Total"]}</td></tr>
                <tr><td colspan="2"><b>Sub Total</b></td><td align="right"><b>${d["Sub Total"]}</b></td></tr>
                <tr><td colspan="2">Discount (-)</td><td align="right">${d["Discount"] || 0}</td></tr>
                <tr><td colspan="2"><b>Paid Amount</b></td><td align="right"><b>${d["Total Paid"]}</b></td></tr>
                <tr><td colspan="2" style="color:red"><b>Due Balance</b></td><td align="right" style="color:red"><b>${d["Remaining"]}</b></td></tr>
            </table>
            <div style="margin-top:15px; display:flex; justify-content:space-between;">
                <span>Parent's Sign</span><span>Operator Sign</span>
            </div>
        `;
        document.getElementById('g-copy').innerHTML = `<div style="font-size:8px; font-weight:bold;">GUARDIAN COPY</div>` + html;
        document.getElementById('o-copy').innerHTML = `<div style="font-size:8px; font-weight:bold;">OFFICE COPY</div>` + html;
        document.getElementById('receipt-modal').style.display = 'block';
    }
</script>
</body>
</html>
