<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 99%; margin: auto; }
        
        /* Filters & Buttons */
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px; justify-content: center; align-items: flex-end; background: #f8f9fa; padding: 10px; border-radius: 8px; }
        .f-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 3px; }
        select, input { padding: 6px; border-radius: 4px; border: 1px solid #ccc; font-size: 12px; outline: none; }
        .btn { background: var(--p); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-print { background: #2e7d32; }

        /* Full Dynamic Table Wrapper */
        .t-wrap { overflow: auto; height: 80vh; border: 1px solid #ddd; position: relative; }
        table { width: 100%; border-collapse: collapse; font-size: 11px; white-space: nowrap; }
        
        /* Spreadsheet Style Header */
        thead th { 
            background: #1a237e; color: #ffffff; padding: 8px 12px; 
            border: 1px solid #ffffff; position: sticky; top: 0; z-index: 10;
        }
        
        td { padding: 6px 10px; border: 1px solid #ddd; text-align: center; background: #fff; }

        /* Sticky ID & Name (First 3 columns) */
        .sticky-col { position: sticky; left: 0; background: #f1f1f1 !important; z-index: 5; border-right: 2px solid #bbb !important; }
        th.sticky-col { z-index: 11; top: 0; }
        
        /* Logic for Name column sticky (approx offset) */
        td:nth-child(3), th:nth-child(3) { position: sticky; left: 45px; z-index: 5; background: #f1f1f1 !important; border-right: 2px solid #bbb !important; }
        th:nth-child(3) { z-index: 11; }

        /* Dynamic Grand Total Footer */
        .total-row td { 
            background: #ffc107 !important; font-weight: bold; color: #000; 
            position: sticky; bottom: 0; z-index: 10;
            border-top: 2px solid #000;
        }
        
        /* Row Highlighting */
        tr:nth-child(even) td { background: #fafafa; }
        tr:hover td { background: #e3f2fd !important; }

        @media print { .no-print { display: none; } .card { box-shadow: none; width: 100%; } .t-wrap { overflow: visible; height: auto; } }
    </style>
</head>
<body>

<div class="card">
    <h4 style="text-align:center; color:var(--p); margin: 5px 0;">SPS MASTER COLLECTION REPORT (Live Sheet)</h4>
    
    <div class="filter-row no-print">
        <div class="f-group">
            <label>MONTH</label>
            <select id="monthInput">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div class="f-group">
            <label>DATE (Optional)</label>
            <input type="date" id="dateInput">
        </div>
        <button class="btn" onclick="loadFullSheet()">REFRESH LIVE DATA</button>
        <button class="btn btn-print" onclick="window.print()">PRINT REPORT</button>
    </div>

    <div class="t-wrap">
        <table id="masterTable">
            <thead id="headerRow"></thead>
            <tbody id="tableBody">
                <tr><td colspan="40" style="padding:40px;">Please click 'REFRESH LIVE DATA' to sync with Google Sheet.</td></tr>
            </tbody>
            <tfoot id="footerRow"></tfoot>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLK7x1LSLSzKqPiQOBT1-3h1SyG8hqmRAOoUdzJaYJ8s4MRQGPzv4Uf2c_yJreh-41/exec";

    async function loadFullSheet() {
        const month = document.getElementById('monthInput').value;
        const dateVal = document.getElementById('dateInput').value;
        
        let fDate = "", aDate = "";
        if(dateVal) {
            let d = dateVal.split("-");
            fDate = `${d[2]}/${d[1]}/${d[0]}`; 
            aDate = `${parseInt(d[2])}/${parseInt(d[1])}/${d[0]}`; 
        }

        document.getElementById('tableBody').innerHTML = "<tr><td colspan='40'>Syncing with Google Sheet (Column A to AI)...</td></tr>";

        try {
            const res = await fetch(`${WEB_APP_URL}?action=getReportData&month=${month}`);
            const data = await res.json();
            
            if (!data.rows || data.rows.length === 0) {
                document.getElementById('tableBody').innerHTML = "<tr><td colspan='40'>No records found.</td></tr>";
                return;
            }

            // 1. Dynamic Headers (Automatic identification of all columns from Sheet)
            const headers = Object.keys(data.rows[0]);

            // 2. Date Filter Logic
            let filtered = data.rows.filter(r => {
                if(!dateVal) return true;
                let rowD = r.date || r["Paid Date"] || r["Date"] || "";
                return (rowD === fDate || rowD === aDate || rowD === dateVal);
            });

            // 3. Render Headers
            let hHtml = "<tr>";
            headers.forEach((h, i) => {
                let cls = (i === 0) ? "sticky-col" : "";
                hHtml += `<th class="${cls}">${h}</th>`;
            });
            hHtml += "</tr>";
            document.getElementById('headerRow').innerHTML = hHtml;

            // 4. Render Body & Sum ALL numeric columns
            let bHtml = "";
            let sums = {};
            headers.forEach(h => sums[h] = 0);

            filtered.forEach(row => {
                bHtml += "<tr>";
                headers.forEach((h, i) => {
                    let val = row[h] === undefined || row[h] === null ? "" : row[h];
                    let cls = (i === 0) ? "sticky-col" : "";
                    
                    // Highlights for Paid vs Dues
                    let style = "";
                    if(h.toLowerCase().includes("paid")) style = "color: green; font-weight:bold;";
                    if(h.toLowerCase().includes("bal") || h.toLowerCase().includes("rem")) style = "color: red; font-weight:bold;";
                    
                    bHtml += `<td class="${cls}" style="${style}">${val}</td>`;
                    
                    // AUTO-SUM Logic: If column is NOT a text field, add it to sums
                    let skipFields = ["id", "student id", "class", "name", "student name", "father name", "address", "date", "paid date", "month"];
                    if(!skipFields.includes(h.toLowerCase())) {
                        let num = parseFloat(val);
                        if(!isNaN(num)) sums[h] += num;
                    }
                });
                bHtml += "</tr>";
            });
            document.getElementById('tableBody').innerHTML = bHtml;

            // 5. Dynamic Footer (Total of every numeric column)
            let fHtml = "<tr class='total-row'>";
            headers.forEach((h, i) => {
                let cls = (i === 0) ? "sticky-col" : "";
                if(i === 0) fHtml += `<td class="${cls}">TOTAL</td>`;
                else if (h.toLowerCase().includes("name")) fHtml += `<td class="${cls}">${filtered.length} Students</td>`;
                else {
                    let skipFields = ["id", "student id", "class", "father name", "address", "date", "paid date", "month"];
                    if(skipFields.includes(h.toLowerCase())) {
                        fHtml += `<td class="${cls}">-</td>`;
                    } else {
                        fHtml += `<td>${sums[h] !== 0 ? sums[h].toLocaleString() : "0"}</td>`;
                    }
                }
            });
            fHtml += "</tr>";
            document.getElementById('footerRow').innerHTML = fHtml;

        } catch (e) {
            document.getElementById('tableBody').innerHTML = "<tr><td colspan='40'>Error: Connection failed. Check Web App.</td></tr>";
        }
    }
</script>
</body>
</html>
