<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .report-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .filter-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        select { padding: 10px; border-radius: 6px; border: 1px solid #ccc; width: 200px; }
        
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        .b-dues { background: #3949ab; } .b-paid { background: #43a047; } .b-bal { background: #e53935; }

        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f1f1f1; padding: 12px; border: 1px solid #ddd; text-align: left; color: var(--p); }
        td { padding: 10px; border: 1px solid #ddd; background: #fff; }
        .name-link { color: blue; cursor: pointer; text-decoration: underline; font-weight: 600; }
        .btn-view { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>

<div class="report-card">
    <h3 style="text-align:center; color:var(--p)">Monthly Collection Report</h3>
    
    <div class="filter-bar">
        <select id="monthSel">
            <option>January</option><option>February</option><option>March</option>
            <option>April</option><option>May</option><option>June</option>
            <option>July</option><option>August</option><option>September</option>
            <option>October</option><option>November</option><option>December</option>
        </select>
        <button class="btn-view" onclick="loadReport()">SHOW</button>
    </div>

    <div class="stats">
        <div class="stat-box b-dues">Total Dues<br><span id="sumD">₹0</span></div>
        <div class="stat-box b-paid">Total Paid<br><span id="sumP">₹0</span></div>
        <div class="stat-box b-bal">Remaining<br><span id="sumB">₹0</span></div>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Class</th>
                <th>Dues</th>
                <th>Paid</th>
                <th>Bal</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    function loadReport() {
        let m = document.getElementById('monthSel').value;
        document.getElementById('tableBody').innerHTML = "<tr><td colspan='6' align='center'>Loading...</td></tr>";
        
        google.script.run.withSuccessHandler(function(res) {
            let html = "";
            res.rows.forEach(r => {
                html += `<tr>
                    <td>${r.id}</td>
                    <td class="name-link" onclick="openStudent('${r.id}')">${r.name}</td>
                    <td>${r.class}</td>
                    <td>₹${r.dues}</td>
                    <td style="color:green; font-weight:bold;">₹${r.paid}</td>
                    <td style="color:red; font-weight:bold;">₹${r.bal}</td>
                </tr>`;
            });
            document.getElementById('tableBody').innerHTML = html;
            document.getElementById('sumD').innerText = "₹" + res.summary.tDues;
            document.getElementById('sumP').innerText = "₹" + res.summary.tPaid;
            document.getElementById('sumB').innerText = "₹" + res.summary.tBal;
        }).getReportData(m);
    }

    function openStudent(id) {
        // Aap yahan Search page ka link bhi de sakte hain
        alert("Fetching receipt for ID: " + id);
    }
</script>
</body>
</html>
