<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .f-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #ccc; outline: none; font-size: 13px; }
        
        /* Table Styles */
        .t-wrap { overflow-x: auto; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
        th { background: var(--p); color: white; padding: 10px; border: 1px solid #ddd; position: sticky; top: 0; z-index: 5; }
        td { padding: 8px; border: 1px solid #ddd; background: #fff; text-align: center; }
        
        /* Total Row Styling */
        .total-row td { background: #fff9c4; font-weight: bold; color: #000; border-top: 2px solid #000; }
        .btn-show { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        
        /* Sticky Columns for mobile scrolling */
        .sticky-col { position: sticky; left: 0; background: #fff !important; z-index: 10; border-right: 2px solid #ddd !important; }
        th.sticky-col { background: var(--p) !important; z-index: 11; }
        td.sticky-col.name-col { left: 45px; } /* ID column width ~45px */
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center; color:var(--p); margin: 0 0 15px 0;">Sagar Public School - Collection Report</h3>
    
    <div class="filter-row no-print">
        <div class="f-group">
            <label>1. SELECT MONTH</label>
            <select id="monthInput">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div class="f-group">
            <label>2. PICK DATE (Daily Filter)</label>
            <input type="date" id="dateInput">
        </div>
        <button class="btn-show" onclick="loadReport()">SHOW REPORT</button>
        <button class="btn-show" style="background:#2e7d32;" onclick="window.print()">PRINT/SAVE</button>
    </div>

    <div class="t-wrap">
        <table id="mainTable">
            <thead id="reportHeader"></thead>
            <tbody id="reportTableBody">
                <tr><td style="padding:20px; color:#666; text-align:center;">Select filters and click Show Report</td></tr>
            </tbody>
            <tfoot id="reportFooter"></tfoot>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLK7x1LSLSzKqPiQOBT1-3h1SyG8hqmRAOoUdzJaYJ8s4MRQGPzv4Uf2c_yJreh-41/exec";

    async function loadReport() {
        let selectedMonth = document.getElementById('monthInput').value;
        let selectedDate = document.getElementById('dateInput').value; 
        
        let formattedDate = "";
        let altDate = "";
        if(selectedDate) {
            let d = selectedDate.split("-");
            formattedDate = `${d[2]}/${d[1]}/${d[0]}`; 
            altDate = `${parseInt(d[2])}/${parseInt(d[1])}/${d[0]}`; 
        }

        document.getElementById('reportTableBody').innerHTML = "<tr><td style='text-align:center'>Searching... Please wait</td></tr>";
        document.getElementById('reportHeader').innerHTML = "";
        document.getElementById('reportFooter').innerHTML = "";

        try {
            const response = await fetch(`${WEB_APP_URL}?action=getReportData&month=${selectedMonth}`);
            const data = await response.json();
            
            if (!data.rows || data.rows.length === 0) {
                document.getElementById('reportTableBody').innerHTML = "<tr><td style='color:orange; text-align:center'>Is mahine ka koi record nahi mila.</td></tr>";
                return;
            }

            // 1. Identification of Dynamic Columns
            // Hum pehle row ki keys uthate hain jo Sheet ke headers hain
            const allKeys = Object.keys(data.rows[0]);
            // Kuch columns hum ignore kar sakte hain agar zaroori ho
            const excludeHeaders = ["date", "Paid Date", "Date"];
            const displayKeys = allKeys.filter(k => !excludeHeaders.includes(k));

            // 2. Row Filtering Logic
            let filteredRows = data.rows.filter(r => {
                if(!selectedDate) return true;
                // backend date field ka naam check karein
                let rowDate = r.date || r["Paid Date"] || r["Date"] || "";
                return (rowDate === formattedDate || rowDate === altDate || rowDate === selectedDate);
            });

            if(filteredRows.length === 0) {
                document.getElementById('reportTableBody').innerHTML = "<tr><td colspan='100' style='color:orange; text-align:center'>Is Taarikh ka koi data nahi mila.</td></tr>";
                return;
            }

            // 3. Render Table Header
            let headHtml = "<tr>";
            displayKeys.forEach((k, index) => {
                let stickyClass = "";
                if(index === 0) stickyClass = "sticky-col"; // ID sticky
                if(index === 1) stickyClass = "sticky-col name-col"; // Name sticky
                headHtml += `<th class="${stickyClass}">${k}</th>`;
            });
            headHtml += "</tr>";
            document.getElementById('reportHeader').innerHTML = headHtml;

            // 4. Render Body & Calculate dynamic totals
            let bodyHtml = "";
            let totals = {};
            displayKeys.forEach(k => totals[k] = 0); // Initialize totals

            filteredRows.forEach(r => {
                bodyHtml += "<tr>";
                displayKeys.forEach((k, index) => {
                    let val = r[k] || 0;
                    let stickyClass = "";
                    if(index === 0) stickyClass = "sticky-col";
                    if(index === 1) stickyClass = "sticky-col name-col";
                    
                    // Column specific styling
                    let style = "";
                    if(k === "Student Name" || k === "Name") style = 'style="text-align:left; font-weight:600; color:blue;"';
                    if(k === "Total Paid" || k === "Paid") style = 'style="color:green; font-weight:bold;"';
                    if(k === "Remaining" || k === "Balance") style = 'style="color:red; font-weight:bold;"';

                    bodyHtml += `<td class="${stickyClass}" ${style}>${val}</td>`;
                    
                    // Calculation logic: Agar value number hai aur yeh system column nahi hai
                    if(!isNaN(parseFloat(val)) && k !== "Student Id" && k !== "id" && k !== "Class" && k !== "class") {
                        totals[k] += parseFloat(val);
                    }
                });
                bodyHtml += "</tr>";
            });
            document.getElementById('reportTableBody').innerHTML = bodyHtml;

            // 5. Render Footer (Yellow Row for Grand Totals)
            let footHtml = "<tr class='total-row'>";
            displayKeys.forEach((k, index) => {
                let stickyClass = "";
                if(index === 0) stickyClass = "sticky-col";
                if(index === 1) stickyClass = "sticky-col name-col";

                if(index === 0) footHtml += `<td class="${stickyClass}">TOTAL</td>`;
                else if(index === 1) footHtml += `<td class="${stickyClass}">${filteredRows.length} Students</td>`;
                else {
                    let totalVal = totals[k];
                    footHtml += `<td>${totalVal > 0 ? "₹" + totalVal.toFixed(0) : "-"}</td>`;
                }
            });
            footHtml += "</tr>";
            document.getElementById('reportFooter').innerHTML = footHtml;

        } catch (e) {
            console.error(e);
            document.getElementById('reportTableBody').innerHTML = "<tr><td style='color:red; text-align:center'>Error fetching data. URL ya network check karein.</td></tr>";
        }
    }
</script>
</body>
</html>
