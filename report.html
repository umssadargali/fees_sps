<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .card { background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 98%; margin: auto; }
        
        /* Header & Filters */
        .header-box { text-align: center; margin-bottom: 15px; }
        .filter-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; justify-content: center; align-items: flex-end; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        .f-group { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input { padding: 8px; border-radius: 6px; border: 1px solid #ccc; outline: none; font-size: 13px; }
        
        /* Full Sheet Style Table */
        .t-wrap { overflow-x: auto; height: 70vh; border: 1px solid #ccc; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; white-space: nowrap; }
        
        /* Google Sheet Style Headers */
        th { 
            background: #e8eaed; color: #333; padding: 8px 12px; 
            border: 1px solid #ccc; position: sticky; top: 0; z-index: 5;
            font-weight: 600; text-transform: capitalize;
        }
        
        td { padding: 6px 12px; border: 1px solid #ddd; text-align: center; background: #fff; }
        
        /* Row Highlighting */
        tr:nth-child(even) td { background: #f9f9f9; }
        tr:hover td { background: #e3f2fd !important; }

        /* Total Row (Live Footer) */
        .total-row td { 
            background: #fbbc04 !important; /* Google Yellow */
            font-weight: bold; color: #000; 
            position: sticky; bottom: 0; z-index: 6;
            border-top: 2px solid #333;
        }
        
        .btn-show { background: var(--p); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        .btn-print { background: #2e7d32; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* Sticky ID & Name columns */
        .sticky-col { position: sticky; left: 0; background: #eee !important; z-index: 8; border-right: 2px solid #bbb !important; }
        th.sticky-col { z-index: 10; top: 0; }
    </style>
</head>
<body>

<div class="card">
    <div class="header-box">
        <h3 style="margin:0; color:var(--p);">SPS LIVE COLLECTION SHEET</h3>
    </div>
    
    <div class="filter-row no-print">
        <div class="f-group">
            <label>SELECT MONTH</label>
            <select id="monthInput">
                <option>January</option><option>February</option><option>March</option>
                <option>April</option><option>May</option><option>June</option>
                <option>July</option><option>August</option><option>September</option>
                <option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div class="f-group">
            <label>DAILY DATE (Optional)</label>
            <input type="date" id="dateInput">
        </div>
        <button class="btn-show" onclick="loadReport()">REFRESH SHEET</button>
        <button class="btn-print" onclick="window.print()">PRINT</button>
    </div>

    <div class="t-wrap">
        <table id="mainTable">
            <thead id="reportHeader"></thead>
            <tbody id="reportTableBody">
                <tr><td style="padding:50px;">Click 'REFRESH SHEET' to load live data...</td></tr>
            </tbody>
            <tfoot id="reportFooter"></tfoot>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzLK7x1LSLSzKqPiQOBT1-3h1SyG8hqmRAOoUdzJaYJ8s4MRQGPzv4Uf2c_yJreh-41/exec";

    async function loadReport() {
        let month = document.getElementById('monthInput').value;
        let sDate = document.getElementById('dateInput').value; 
        
        let fDate = "", aDate = "";
        if(sDate) {
            let d = sDate.split("-");
            fDate = `${d[2]}/${d[1]}/${d[0]}`; 
            aDate = `${parseInt(d[2])}/${parseInt(d[1])}/${d[0]}`; 
        }

        document.getElementById('reportTableBody').innerHTML = "<tr><td colspan='20'>Loading Live Sheet...</td></tr>";

        try {
            const res = await fetch(`${WEB_APP_URL}?action=getReportData&month=${month}`);
            const data = await res.json();
            
            if (!data.rows || data.rows.length === 0) {
                document.getElementById('reportTableBody').innerHTML = "<tr><td colspan='20'>No data found for this month.</td></tr>";
                return;
            }

            // 1. Get ALL headers from the first row of data
            const headers = Object.keys(data.rows[0]);

            // 2. Filter rows by Date if selected
            let rows = data.rows.filter(r => {
                if(!sDate) return true;
                let rd = r.date || r["Paid Date"] || r["Date"] || "";
                return (rd === fDate || rd === aDate || rd === sDate);
            });

            // 3. Build Header
            let hHtml = "<tr>";
            headers.forEach((h, i) => {
                let cls = (i === 0 || i === 2) ? "sticky-col" : ""; // ID and Name sticky
                hHtml += `<th class="${cls}">${h}</th>`;
            });
            hHtml += "</tr>";
            document.getElementById('reportHeader').innerHTML = hHtml;

            // 4. Build Body & Calc Totals
            let bHtml = "";
            let sums = {};
            headers.forEach(h => sums[h] = 0);

            rows.forEach(r => {
                bHtml += "<tr>";
                headers.forEach((h, i) => {
                    let val = r[h] || "";
                    let cls = (i === 0 || i === 2) ? "sticky-col" : "";
                    
                    // Style specific columns
                    let style = "";
                    if(h.toLowerCase().includes("paid")) style = "color: green; font-weight:bold;";
                    if(h.toLowerCase().includes("rem") || h.toLowerCase().includes("bal")) style = "color: red; font-weight:bold;";
                    
                    bHtml += `<td class="${cls}" style="${style}">${val}</td>`;
                    
                    // Add to sum if numeric
                    let num = parseFloat(val);
                    if(!isNaN(num) && !["id", "student id", "class", "roll"].includes(h.toLowerCase())) {
                        sums[h] += num;
                    }
                });
                bHtml += "</tr>";
            });
            document.getElementById('reportTableBody').innerHTML = bHtml;

            // 5. Build Footer (Grand Total Row)
            let fHtml = "<tr class='total-row'>";
            headers.forEach((h, i) => {
                let cls = (i === 0 || i === 2) ? "sticky-col" : "";
                if(i === 0) fHtml += `<td class="${cls}">TOTAL</td>`;
                else if (i === 1) fHtml += `<td class="${cls}">-</td>`;
                else if (i === 2) fHtml += `<td class="${cls}">${rows.length} Students</td>`;
                else {
                    fHtml += `<td>${sums[h] > 0 ? "₹" + sums[h].toFixed(0) : "-"}</td>`;
                }
            });
            fHtml += "</tr>";
            document.getElementById('reportFooter').innerHTML = fHtml;

        } catch (e) {
            document.getElementById('reportTableBody').innerHTML = "<tr><td>Error loading data.</td></tr>";
        }
    }
</script>
</body>
</html>
