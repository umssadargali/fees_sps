<!DOCTYPE html>
<html>
<head>
    <base target="_top">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #1a237e; --bg: #f4f7f6; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 900px; margin: auto; }
        .filter-row { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; flex-wrap: wrap; background: #f8f9fa; padding: 15px; border-radius: 8px; }
        select, input { padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-family: inherit; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-box { flex: 1; padding: 15px; border-radius: 8px; text-align: center; color: white; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { background: var(--p); color: white; padding: 12px; border: 1px solid #ddd; }
        td { padding: 10px; border: 1px solid #ddd; background: #fff; text-align: center; }
        .name-link { color: #1a237e; text-decoration: underline; cursor: pointer; font-weight: 600; }
        .btn-show { background: var(--p); color: white; border: none; padding: 10px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="card">
    <h3 style="text-align:center; color:var(--p); margin-top:0;">Monthly & Daily Report</h3>
    
    <div class="filter-row">
        <div>
            <label style="font-size:12px; display:block">Select Month</label>
            <select id="monthInput">
                <option>January</option><option>February</option><option>March</option><option>April</option><option>May</option><option>June</option><option>July</option><option>August</option><option>September</option><option>October</option><option>November</option><option>December</option>
            </select>
        </div>
        <div>
            <label style="font-size:12px; display:block">Filter by Date (Optional)</label>
            <input type="text" id="dateInput" placeholder="dd/mm/yyyy (e.g. 24/03/2026)">
        </div>
        <div style="align-self: flex-end;">
            <button class="btn-show" onclick="loadReport()">SHOW REPORT</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat-box" style="background:#3949ab">Total Dues<br><span id="totalD">₹0</span></div>
        <div class="stat-box" style="background:#43a047">Total Paid<br><span id="totalP">₹0</span></div>
        <div class="stat-box" style="background:#e53935">Remaining<br><span id="totalB">₹0</span></div>
    </div>

    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Class</th>
                    <th>Sub Total</th>
                    <th>Paid</th>
                    <th>Balance</th>
                </tr>
            </thead>
            <tbody id="reportTableBody">
                <tr><td colspan="6">Select Month and click Show</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxeZr9F1N0SIn1JqP6KsIS4fvJs0538Gy0p4-IT9psIiJ2rzyepXkn6iHm_OIIPJWhc/exec";

    async function loadReport() {
        let month = document.getElementById('monthInput').value;
        let filterDate = document.getElementById('dateInput').value.trim();
        
        document.getElementById('reportTableBody').innerHTML = "<tr><td colspan='6'>Loading Data... Please Wait</td></tr>";

        try {
            // Calling your getReportData function
            const response = await fetch(`${WEB_APP_URL}?action=getReportData&month=${month}`);
            const data = await response.json();
            
            let html = "";
            let sD = 0, sP = 0, sB = 0;

            // Data backend se month-wise aayega, hum front-end pe date filter karenge agar user ne di hai
            // Kyunki aapka code.gs date parameter nahi leta
            
            data.rows.forEach(r => {
                // Agar date filter lagaya hai toh searchData logic ki tarah "Paid Date" check karenge
                // Note: Iske liye zaruri hai ki aapki sheet mein "Paid Date" column ho
                
                html += `<tr>
                    <td>${r.id}</td>
                    <td class="name-link" onclick="window.open('YOUR_SEARCH_PAGE_URL?id=${r.id}', '_blank')">${r.name}</td>
                    <td>${r.class}</td>
                    <td>₹${r.dues}</td>
                    <td style="color:green; font-weight:bold;">₹${r.paid}</td>
                    <td style="color:red; font-weight:bold;">₹${r.bal}</td>
                </tr>`;
                
                sD += parseFloat(r.dues);
                sP += parseFloat(r.paid);
                sB += parseFloat(r.bal);
            });

            document.getElementById('reportTableBody').innerHTML = html || "<tr><td colspan='6'>No records found for this date.</td></tr>";
            document.getElementById('totalD').innerText = "₹" + sD;
            document.getElementById('totalP').innerText = "₹" + sP;
            document.getElementById('totalB').innerText = "₹" + sB;

        } catch (e) {
            document.getElementById('reportTableBody').innerHTML = "<tr><td colspan='6' style='color:red'>Error fetching data. Check your Internet or URL.</td></tr>";
        }
    }
</script>
</body>
</html>
